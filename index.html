<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Brutalist Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-header">
        <h1>EMPIREX</h1>
        <h2>E-CELL BMSIT&M</h2>
    </div>


    <div class="timer-container">
        <div class="timer-box" id="timer-box">
            <h1 id="time-text">15:00</h1>
        </div>
    </div>

    <div class="controls-container">
        <button id="toggle-btn" class="btn btn-pink">START TIMER</button>
        <button id="reset-btn" class="btn btn-teal">RESET</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
