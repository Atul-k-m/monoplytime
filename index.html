<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="timer-container">
        <div class="circle-progress">
            <svg viewBox="0 0 200 200">
                <circle class="bg" cx="100" cy="100" r="90"></circle>
                <circle class="progress" cx="100" cy="100" r="90"></circle>
            </svg>
            <div class="time-display">
                <span id="time-text">08:00</span>
            </div>
        </div>
        
        <div class="message-box">
            <h1 id="status-message">Ready</h1>
        </div>

        <div class="controls">
            <button id="start-btn" class="btn primary">Start</button>
            <button id="pause-btn" class="btn secondary">Pause</button>
            <button id="reset-btn" class="btn danger">Reset</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
